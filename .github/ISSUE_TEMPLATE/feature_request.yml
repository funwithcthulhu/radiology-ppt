name: Feature request
description: Suggest an improvement to the desktop app, workflow, or generated PowerPoints.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem should this solve?
      description: Describe the workflow pain point or missing capability.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should the app do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Cases / Radiopaedia search
        - Review window
        - PowerPoint export
        - Core Boards
        - Installer / release
        - Architecture / performance
        - Other
