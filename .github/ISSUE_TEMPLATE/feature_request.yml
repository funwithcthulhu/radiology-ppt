name: Feature request
description: Request a change to the desktop app, workflow, or generated PowerPoints.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the workflow gap or missing capability.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the requested behavior.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Cases / Radiopaedia search
        - Review window
        - PowerPoint export
        - Core Boards
        - Installer / release
        - Architecture / performance
        - Other
