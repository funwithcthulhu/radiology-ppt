name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Node tests and WPF build
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Node dependencies
        run: npm ci

      - name: Run Node tests
        run: npm test

      - name: Build Windows app
        run: dotnet build .\csharp\RadiologyPpt.App\RadiologyPpt.App.csproj --configuration Release
