name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Installer version, without the leading v"
        required: true
        default: "0.2.1"
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  installer:
    name: Build installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "version=${{ inputs.version }}" >> $env:GITHUB_OUTPUT
          } else {
            $refName = "${{ github.ref_name }}"
            "version=$($refName.TrimStart('v'))" >> $env:GITHUB_OUTPUT
          }

      - name: Build installer
        shell: pwsh
        run: .\build-windows-installer.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: Radiopaedia-Case-PowerPoint-Builder-Setup-v${{ steps.version.outputs.version }}
          path: dist/installer/*.exe

      - name: Publish installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = "${{ steps.version.outputs.version }}"
          $notesPath = "docs/releases/$tag.md"
          if (-not (Test-Path $notesPath)) {
            $notesPath = "docs/releases/v$version.md"
          }

          $releaseExists = $false
          try {
            gh release view $tag *> $null
            $releaseExists = $LASTEXITCODE -eq 0
          } catch {
            $releaseExists = $false
          }

          if (-not $releaseExists) {
            if (Test-Path $notesPath) {
              gh release create $tag --title "Radiopaedia Case PowerPoint Builder $tag" --notes-file $notesPath
            } else {
              gh release create $tag --title "Radiopaedia Case PowerPoint Builder $tag" --generate-notes
            }
          }

          gh release upload $tag .\dist\installer\*.exe --clobber
