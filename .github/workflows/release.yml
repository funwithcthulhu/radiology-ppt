name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Installer version, without the leading v"
        required: true
        default: "0.1.0"
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  installer:
    name: Build installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "version=${{ inputs.version }}" >> $env:GITHUB_OUTPUT
          } else {
            $refName = "${{ github.ref_name }}"
            "version=$($refName.TrimStart('v'))" >> $env:GITHUB_OUTPUT
          }

      - name: Build installer
        shell: pwsh
        run: .\build-windows-installer.ps1 -Version "${{ steps.version.outputs.version }}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Radiopaedia-Case-PowerPoint-Builder-Setup-v${{ steps.version.outputs.version }}
          path: dist/installer/*.exe
